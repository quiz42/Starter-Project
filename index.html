<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="A tiny train dispatcher. Click anywhere to send a train chugging across the screen."
    />
    <meta property="og:title" content="welcome to conductor" />
    <meta property="og:description" content="Click anywhere to dispatch a train." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="./public/favicon.png" />
    <title>welcome to conductor</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #151515;
        --muted: #7a7a7a;
        --faint: #d9d9d9;
        --paper: #fbfbfa;
        --panel: rgba(255, 255, 255, 0.72);
        --accent: #111;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: var(--paper);
        color: var(--ink);
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "SF Pro Text",
          "Helvetica Neue",
          Helvetica,
          Arial,
          sans-serif;
        font-feature-settings: "kern";
      }

      main {
        position: relative;
        display: block;
        width: 100vw;
        min-height: 100svh;
        overflow: hidden;
        cursor: pointer;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      .hero {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        gap: 18px;
        padding: 32px;
        text-align: center;
        transition: opacity 600ms ease;
        pointer-events: none;
      }

      .hero.dispatched {
        opacity: 0;
      }

      .hero-inner {
        display: grid;
        gap: 18px;
        place-items: center;
      }

      .train-emoji {
        display: inline-block;
        font-size: clamp(56px, 10vw, 96px);
        line-height: 1;
        transform-origin: 50% 60%;
        pointer-events: auto;
      }

      .train-emoji:hover {
        animation: wiggle 600ms ease-in-out;
      }

      .tagline {
        max-width: 28ch;
        color: var(--muted);
        font-size: 14px;
        font-weight: 450;
        letter-spacing: 0;
        line-height: 1.5;
      }

      .train {
        position: fixed;
        left: 0;
        z-index: 1;
        font-size: clamp(38px, 6vw, 56px);
        line-height: 1;
        pointer-events: none;
        animation-fill-mode: forwards;
        animation-timing-function: linear;
        will-change: transform;
      }

      .train.ltr {
        animation-name: train-ltr;
      }

      .train.rtl {
        animation-name: train-rtl;
      }

      .steam {
        position: fixed;
        z-index: 0;
        color: #c9c9c7;
        font-size: 18px;
        pointer-events: none;
        animation: puff 1400ms ease-out forwards;
        will-change: transform, opacity;
      }

      .mute-toggle {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 10;
        display: inline-flex;
        width: 38px;
        height: 38px;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--faint);
        border-radius: 999px;
        background: var(--panel);
        color: var(--ink);
        cursor: pointer;
        font-size: 16px;
        backdrop-filter: blur(14px);
        transition:
          border-color 150ms ease,
          background 150ms ease,
          transform 150ms ease;
      }

      .mute-toggle:hover {
        background: #fff;
        border-color: #b8b8b8;
        transform: translateY(-1px);
      }

      .mute-toggle:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      .counter {
        position: fixed;
        bottom: 16px;
        left: 16px;
        z-index: 10;
        color: var(--muted);
        font-size: 13px;
        font-weight: 450;
        letter-spacing: 0;
        pointer-events: none;
      }

      .milestone {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        padding: 28px;
        pointer-events: none;
        opacity: 0;
        visibility: hidden;
      }

      .milestone.active {
        visibility: visible;
        animation: milestone-fade 2600ms ease both;
      }

      .milestone-card {
        position: relative;
        width: min(520px, calc(100vw - 48px));
        overflow: hidden;
        border: 1px solid rgba(21, 21, 21, 0.1);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 22px 60px rgba(21, 21, 21, 0.16);
        backdrop-filter: blur(18px);
      }

      .milestone-track {
        position: relative;
        height: 92px;
        overflow: hidden;
        border-bottom: 1px solid rgba(21, 21, 21, 0.08);
      }

      .milestone-track::before {
        position: absolute;
        right: 0;
        bottom: 22px;
        left: 0;
        height: 3px;
        background: repeating-linear-gradient(
          90deg,
          #151515 0 22px,
          transparent 22px 34px
        );
        content: "";
        opacity: 0.3;
      }

      .milestone-train {
        position: absolute;
        bottom: 28px;
        left: -120px;
        font-size: 44px;
        line-height: 1;
        white-space: nowrap;
      }

      .milestone.active .milestone-train {
        animation: milestone-train 1800ms cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      .milestone-count {
        display: grid;
        gap: 4px;
        padding: 18px 20px 20px;
        text-align: center;
      }

      .milestone-number {
        color: var(--ink);
        font-size: clamp(34px, 9vw, 58px);
        font-weight: 750;
        letter-spacing: 0;
        line-height: 1;
      }

      .milestone-label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 520;
        letter-spacing: 0;
        line-height: 1.4;
      }

      @keyframes wiggle {
        0%,
        100% {
          transform: rotate(0);
        }

        25% {
          transform: translateY(-4px) rotate(-6deg);
        }

        75% {
          transform: translateY(-4px) rotate(6deg);
        }
      }

      @keyframes train-ltr {
        from {
          transform: translateX(-15vw) scaleX(-1);
        }

        to {
          transform: translateX(115vw) scaleX(-1);
        }
      }

      @keyframes train-rtl {
        from {
          transform: translateX(115vw);
        }

        to {
          transform: translateX(-15vw);
        }
      }

      @keyframes puff {
        0% {
          opacity: 0.7;
          transform: translate(0, 0) scale(0.8);
        }

        100% {
          opacity: 0;
          transform: translate(0, -40px) scale(1.4);
        }
      }

      @keyframes milestone-fade {
        0% {
          opacity: 0;
          transform: translateY(10px) scale(0.96);
        }

        12%,
        82% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }

        100% {
          opacity: 0;
          transform: translateY(-6px) scale(0.98);
        }
      }

      @keyframes milestone-train {
        0% {
          transform: translateX(0) rotate(-2deg);
        }

        58% {
          transform: translateX(calc(min(520px, 100vw - 48px) - 155px))
            rotate(1deg);
        }

        100% {
          transform: translateX(calc(min(520px, 100vw - 48px) + 120px))
            rotate(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .hero,
        .train-emoji:hover,
        .milestone.active,
        .milestone.active .milestone-train {
          animation: none;
          transition: none;
        }

        .milestone.active {
          opacity: 1;
        }

        .milestone.active .milestone-train {
          left: 50%;
          transform: translateX(-50%);
        }

        .steam {
          display: none;
        }

        .train.ltr,
        .train.rtl {
          left: 50%;
          animation: fade-blip 1500ms ease both !important;
        }

        @keyframes fade-blip {
          0% {
            opacity: 0;
            transform: translateX(-50%) scale(0.85);
          }

          20%,
          80% {
            opacity: 1;
            transform: translateX(-50%) scale(1);
          }

          100% {
            opacity: 0;
            transform: translateX(-50%) scale(1);
          }
        }
      }
    </style>
  </head>
  <body>
    <main id="dispatcher">
      <div class="hero" id="hero">
        <div class="hero-inner">
          <span class="train-emoji" role="img" aria-label="train">🚂</span>
          <span class="tagline">Click anywhere to dispatch a train.</span>
        </div>
      </div>

      <button
        class="mute-toggle"
        id="mute"
        type="button"
        aria-label="Mute"
        aria-pressed="false"
      >
        🔊
      </button>

      <div class="counter" id="counter" aria-live="polite">0 trains dispatched</div>

      <div
        class="milestone"
        id="milestone"
        aria-live="polite"
        aria-atomic="true"
      >
        <div class="milestone-card">
          <div class="milestone-track">
            <div class="milestone-train" aria-hidden="true">🚂🚃🚃</div>
          </div>
          <div class="milestone-count">
            <span class="milestone-number" id="milestone-number">10</span>
            <span class="milestone-label">trains dispatched</span>
          </div>
        </div>
      </div>
    </main>

    <script>
      const TRAIN_EMOJIS = ["🚂", "🚃", "🚅", "🚋", "🚄"];
      const PUFF_CHARS = ["·", "°", "・", "∘"];
      const LANE_COUNT = 5;
      const DISPATCH_THROTTLE_MS = 120;
      const PUFF_COUNT = 4;
      const MIN_DURATION_MS = 4500;
      const MAX_DURATION_MS = 7500;

      const dispatcher = document.querySelector("#dispatcher");
      const hero = document.querySelector("#hero");
      const muteButton = document.querySelector("#mute");
      const counter = document.querySelector("#counter");
      const milestone = document.querySelector("#milestone");
      const milestoneNumber = document.querySelector("#milestone-number");
      const choo = new Audio("./public/choo-choo.mp3");
      choo.preload = "auto";

      let count = 0;
      let nextId = 1;
      let lastDispatch = 0;
      let lastLane = -1;
      let lastDirection = "rtl";
      let muted = localStorage.getItem("wtc:muted") === "1";
      let milestoneTimer;

      function pick(items) {
        return items[Math.floor(Math.random() * items.length)];
      }

      function syncMuteButton() {
        muteButton.textContent = muted ? "🔇" : "🔊";
        muteButton.setAttribute("aria-label", muted ? "Unmute" : "Mute");
        muteButton.setAttribute("aria-pressed", String(muted));
        localStorage.setItem("wtc:muted", muted ? "1" : "0");
      }

      function updateCounter() {
        const noun = count === 1 ? "train" : "trains";
        counter.textContent = `${count} ${noun} dispatched`;
        document.title =
          count === 0 ? "welcome to conductor" : `welcome to conductor (${count})`;
      }

      function playChoo() {
        if (muted) return;
        const node = choo.cloneNode(true);
        node.volume = 0.28;
        node.play().catch(() => {});
      }

      function showMilestoneAnimation() {
        milestoneNumber.textContent = String(count);
        milestone.classList.remove("active");
        window.clearTimeout(milestoneTimer);

        requestAnimationFrame(() => {
          milestone.classList.add("active");
          milestoneTimer = window.setTimeout(() => {
            milestone.classList.remove("active");
          }, 2600);
        });
      }

      function removeNode(event) {
        event.currentTarget.remove();
      }

      function createSteam(train, delay) {
        window.setTimeout(() => {
          const elapsed = performance.now() - train.startedAt;
          const progress = Math.min(elapsed / train.durationMs, 1);
          const puff = document.createElement("span");
          const x =
            train.direction === "ltr"
              ? -15 + 130 * progress
              : 115 - 130 * progress;

          puff.className = "steam";
          puff.textContent = pick(PUFF_CHARS);
          puff.style.left = `${x}vw`;
          puff.style.top = `${10 + train.lane * 16}vh`;
          puff.addEventListener("animationend", removeNode, { once: true });
          dispatcher.append(puff);
        }, delay);
      }

      function dispatchTrain() {
        const now = performance.now();
        if (now - lastDispatch < DISPATCH_THROTTLE_MS) return;
        lastDispatch = now;

        let lane = Math.floor(Math.random() * LANE_COUNT);
        if (lane === lastLane) lane = (lane + 1) % LANE_COUNT;
        lastLane = lane;

        const direction = lastDirection === "ltr" ? "rtl" : "ltr";
        lastDirection = direction;

        const durationMs =
          MIN_DURATION_MS + Math.random() * (MAX_DURATION_MS - MIN_DURATION_MS);
        const train = {
          id: nextId++,
          lane,
          direction,
          durationMs,
          startedAt: now,
        };

        const trainNode = document.createElement("span");
        trainNode.className = `train ${direction}`;
        trainNode.textContent = pick(TRAIN_EMOJIS);
        trainNode.style.top = `${10 + lane * 16}vh`;
        trainNode.style.animationDuration = `${durationMs}ms`;
        trainNode.addEventListener("animationend", removeNode, { once: true });
        dispatcher.append(trainNode);

        count += 1;
        hero.classList.add("dispatched");
        updateCounter();
        playChoo();

        if (count % 10 === 0) {
          showMilestoneAnimation();
        }

        for (let i = 0; i < PUFF_COUNT; i += 1) {
          createSteam(train, (durationMs / (PUFF_COUNT + 1)) * (i + 1));
        }
      }

      dispatcher.addEventListener("click", dispatchTrain);
      muteButton.addEventListener("click", (event) => {
        event.stopPropagation();
        muted = !muted;
        syncMuteButton();
      });

      window.addEventListener("keydown", (event) => {
        if (event.code === "Space" || event.code === "Enter") {
          event.preventDefault();
          dispatchTrain();
        } else if (event.key === "m" || event.key === "M") {
          muted = !muted;
          syncMuteButton();
        }
      });

      syncMuteButton();
      updateCounter();
    </script>
  </body>
</html>
